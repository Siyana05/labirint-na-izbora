<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Лабиринт на избора</title>

<style>

body{
background:#0b3d91;
color:white;
font-family:Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
justify-content:center;
margin-top:40px;
}

.cell{
width:120px;
height:120px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:10px;
font-weight:bold;
}

.visited{
background:green;
color:white;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
}

</style>

</head>

<body>

<img src="logo.png" width="140">

<h1>Премини през лабиринта на избора</h1>

<div class="grid">

<div class="cell" onclick="askQuestion(0)">Въпрос 1</div>
<div class="cell" onclick="askQuestion(1)">Въпрос 2</div>
<div class="cell" onclick="askQuestion(2)">Въпрос 3</div>
<div class="cell" onclick="askQuestion(3)">Въпрос 4</div>
<div class="cell" onclick="askQuestion(4)">Въпрос 5</div>
<div class="cell" onclick="askQuestion(5)">Въпрос 6</div>

</div>

<div id="questionBox"></div>
<div id="buttons"></div>
<div id="result"></div>

<script>

const questions=[
"Да защитим ли децата със всички мерки?",
"Да подобрим ли семейната среда?",
"Да защитим ли работните места за българите?",
"Да взимаме ли още държавни кредити?",
"Да има ли повече референдуми?",
"Какво мислите за Зелената сделка?"
];

const correct=[
"ДА","ДА","ДА","НЕ","ДА","НЕ ПРИЕМАМ"
];

let mistakes=0;
let answered=[false,false,false,false,false,false];

function askQuestion(i){

document.getElementById("questionBox").innerText=questions[i];

if(i==5){

document.getElementById("buttons").innerHTML=

"<button onclick=\"answer('ПРИЕМАМ',"+i+")\">Приемам</button>"+
"<button onclick=\"answer('НЕ ПРИЕМАМ',"+i+")\">Не приемам</button>";

}
else{

document.getElementById("buttons").innerHTML=

"<button onclick=\"answer('ДА',"+i+")\">Да</button>"+
"<button onclick=\"answer('НЕ',"+i+")\">Не</button>";

}

}

function answer(user,i){

if(answered[i]) return;

answered[i]=true;

if(user!==correct[i]) mistakes++;

document.getElementsByClassName("cell")[i].classList.add("visited");

checkFinish();

}

function checkFinish(){

if(answered.every(x=>x)){

document.getElementById("questionBox").innerHTML="";
document.getElementById("buttons").innerHTML="";

if(mistakes<=2){

document.getElementById("result").innerHTML=

"<h2>Вашият избор е ИТН</h2>"+
"<img src='final.png' width='300'>";

}
else{

document.getElementById("result").innerHTML=

"<h2>Вашият избор е различен</h2>";

}

}

}

</script>

</body>
</html>
